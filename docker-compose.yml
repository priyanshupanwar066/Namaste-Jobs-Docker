version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://34.230.134.233:8000

    container_name: frontend
    restart: always

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env.local

    depends_on:
      - backend
